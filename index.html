<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>黃金快速交易計算器</title>
    <style>
        <link rel="apple-touch-icon" href="icon.png">
        :root {
            --bg-color: #000000;
            --card-bg: #1a1a1a;
            --long-color: #ff69b4; /* 多單粉 */
            --short-color: #98fb98; /* 空單綠 */
            --tp-color: #22c55e;
            --sl-color: #f87171;
            --input-bg: #ffffff; /* 改為白色 */
        }
        body { font-family: sans-serif; background: var(--bg-color); color: white; margin: 0; padding: 15px; }
        .section { background: var(--card-bg); border-radius: 15px; padding: 20px; margin-bottom: 20px; border-left: 10px solid; }
        .long-sec { border-left-color: var(--long-color); }
        .short-sec { border-left-color: var(--short-color); }
        h2 { margin-top: 0; font-size: 1.5rem; }
        .long-title { color: var(--long-color); }
        .short-title { color: var(--short-color); }
        
        /* 輸入框強化：白色背景、大數字 */
        input { 
            width: 100%; 
            height: 80px; 
            font-size: 40px; /* 數字加大 */
            font-weight: bold;
            background: var(--input-bg); 
            color: black; /* 白色底配黑字 */
            border: 4px solid #fbbf24; 
            border-radius: 12px; 
            text-align: center; 
            outline: none; 
            margin: 15px 0; 
        }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .box { padding: 20px 10px; border-radius: 10px; text-align: center; }
        .sl-box { background: rgba(248, 113, 113, 0.15); border: 2px solid var(--sl-color); }
        .tp-box { background: rgba(34, 197, 94, 0.15); border: 2px solid var(--tp-color); }
        
        /* 停損停利數字特大化 */
        .val { display: block; font-size: 36px; font-weight: 900; font-family: 'Courier New', monospace; }
        .label { font-size: 1rem; color: #94a3b8; font-weight: bold; }
        .final-val { font-size: 18px; color: #ffffff; margin-top: 8px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 4px; border-radius: 4px; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #fbbf24; font-size: 1.8rem; margin-bottom: 10px;">黃金 XAUUSD 計算器</h1>

    <!-- 多單區塊 -->
    <div class="section long-sec">
        <h2 class="long-title">多單 (BUY)</h2>
        <label class="label">輸入進單價 (白色框)</label>
        <input type="number" id="longPrice" placeholder="0.00" step="0.01" oninput="calcLong()" onclick="this.select()" autofocus>
        <div class="grid">
            <div class="box sl-box">
                <span class="label">停損 -8.3</span>
                <span id="l-sl" class="val" style="color:var(--sl-color)">0.00</span>
            </div>
            <div class="box tp-box">
                <span class="label">停利 +20.3</span>
                <span id="l-tp" class="val" style="color:var(--tp-color)">0.00</span>              
            </div>
        </div>
    </div>

    <!-- 空單區塊 -->
    <div class="section short-sec">
        <h2 class="short-title">空單 (SELL)</h2>
        <label class="label">輸入進單價 (白色框)</label>
        <input type="number" id="shortPrice" placeholder="0.00" step="0.01" oninput="calcShort()" onclick="this.select()">
        <div class="grid">
            <div class="box sl-box">
                <span class="label">停損 +8.3</span>
                <span id="s-sl" class="val" style="color:var(--sl-color)">0.00</span>
            </div>
            <div class="box tp-box">
                <span class="label">停利 -20.3</span>
                <span id="s-tp" class="val" style="color:var(--tp-color)">0.00</span>                
            </div>
        </div>
    </div>

    <script>
        const spread = 0.3;

        function calcLong() {
            let p = parseFloat(document.getElementById('longPrice').value);
            if (p) {
                document.getElementById('l-sl').innerText = (p - 8.3).toFixed(2);
                let tp = p + 20.3;
                document.getElementById('l-tp').innerText = tp.toFixed(2);
                document.getElementById('l-tp-spread').innerText = "含點差: " + (tp + spread).toFixed(2);
            }
        }

        function calcShort() {
            let p = parseFloat(document.getElementById('shortPrice').value);
            if (p) {
                document.getElementById('s-sl').innerText = (p + 8.3).toFixed(2);
                let tp = p - 20.3;
                document.getElementById('s-tp').innerText = tp.toFixed(2);
                document.getElementById('s-tp-spread').innerText = "含點差: " + (tp - spread).toFixed(2);
            }
        }
    </script>
</body>
</html>
